name: Build And Publish
on:
  push:
    branches: [trunk]
    tags: ['*']
  pull_request:

jobs:
  build-and-publish:
    permissions:
      contents: read
      id-token: write  # enable GitHub OIDC token issuance for this job

    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Extract version from tag
        id: get_version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -match 'refs/tags/v?(.+)') {
            $version = $matches[1]
            Write-Output "VERSION=$version" >> $env:GITHUB_OUTPUT
            Write-Output "Using version: $version"
          } else {
            Write-Output "VERSION=1.0.0" >> $env:GITHUB_OUTPUT
            Write-Output "No tag found, using default version: 1.0.0"
          }

      - name: dotnet pack
        run: |
          dotnet pack /p:Version=${{ steps.get_version.outputs.VERSION }}
          dotnet pack -r win-x64 /p:Version=${{ steps.get_version.outputs.VERSION }}

      # Use the ambient GitHub token to login to NuGet and retrieve an API key
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          # Secret is your NuGet username, e.g. andrewlock
          user: ${{ secrets.NUGET_USER }}

      - name: push to NuGet
        # Only push to NuGet if we're building a tag (optional)
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        # Loop through all the packages in the output folder and push them to
        # nuget.org, using the NUGET_API_KEY generated by the previous login step
        run: |
          Get-ChildItem ArghParser\bin\Release -Filter *.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName `
              --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" `
              --source https://api.nuget.org/v3/index.json
          }
